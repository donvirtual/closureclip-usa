<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClosureClip | Offline</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #000000;
      color: #7cff7c;
      font-family: Consolas, "Courier New", monospace;
      padding: 20px;
      overflow: hidden;
      font-size: 15px;
      line-height: 1.55;
    }
    .terminal { white-space: pre-wrap; }
    .prompt { color: #8cd8ff; }
    .warn { color: #ffe08a; }
    .cursor {
      display: inline-block;
      width: 9px;
      margin-left: 4px;
      background: #7cff7c;
      animation: blink 1s steps(1, end) infinite;
      vertical-align: -1px;
      height: 16px;
    }
    @keyframes blink {
      0%, 50% { opacity: 1; }
      50.01%, 100% { opacity: 0; }
    }
  </style>
</head>
<body>
  <main class="terminal" aria-label="Offline terminal message">
<span class="prompt">PS C:\ClosureClip&gt;</span> status
SYSTEM STATUS : OFFLINE
SERVICE       : closureclip-usa.com
TIMESTAMP     : 2026-03-16

<span class="prompt">PS C:\ClosureClip&gt;</span> message
<span class="warn">Website tijdelijk offline voor onderhoud.</span>
Please try again later.

<span class="prompt">PS C:\ClosureClip&gt;</span><span class="cursor" aria-hidden="true"></span>
  </main>
</body>
</html>
